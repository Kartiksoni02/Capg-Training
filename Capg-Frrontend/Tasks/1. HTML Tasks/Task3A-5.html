<!DOCTYPE html>
<html>
<head>
    <title>Pizza Order</title>
</head>
<body>

<h2>Pizza Order Here</h2>

<form>
    First Name: <input type="text"><br><br>
    Last Name: <input type="text"><br><br>
    Email: <input type="email"><br><br>
    Contact: <input type="text"><br><br>

    Delivery Date: <input type="date"><br><br>

    Size:
    <input type="radio" name="size"> Small
    <input type="radio" name="size"> Medium
    <input type="radio" name="size"> Large
    <br><br>

    Outlet:
    <select>
        <option>Select Outlet</option>
        <option>Kochi</option>
        <option>Jaipur</option>
    </select>

    <h3>Menu</h3>

    <input type="checkbox"> Hawaiian
    <select><option>1</option><option>2</option></select><br><br>

    <input type="checkbox"> Pepperoni
    <select><option>1</option><option>2</option></select><br><br>

    <input type="checkbox"> Vegetable
    <select><option>1</option><option>2</option></select><br><br>

    Credit Card: <input type="text"><button>Verify</button><br><br>
    Pin: <input type="password"><br><br>

    Upload Photo: <input type="file"><br><br>

    Additional Note:<br>
    <textarea></textarea><br><br>

    Rating: <input type="range"><br><br>

    <input type="submit" value="Submit Order">
</form>

</body>
</html>
