<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1>Form Fields</h1>

    <form action="#">
        <fieldset>
            <legend>Application Form</legend>

            <label for="name">Name: </label>
            <input type="text" id="name" name="name">
            <br>
            <br>


            <label for="email">Email: </label>
            <input type="email" name="email" id="email">
            <br>
            <br>

            <label for="password">Password: </label>
            <input type="password" name="password" id="password">
            <br>
            <br>

            <label for="gender">Gender: </label>
            Male<input type="radio" name="gender" id="gender">
            Female<input type="radio" name="gender" id="gender">
            Other<input type="radio" name="gender" id="gender">
            <br>
            <br>

            <p> Select your country</p>
            <select name="Country" id ="Country" >
                <option selected disabled>Select</option>
                <optgroup label ="Asia">
                    
                    <option value="Ind">India</option>
                    <option value="Chi">China</option>
                    <option value="Rus">Russia</option>
                    <option value="Nep">Nepal</option>
                    <option value="SL">SriLanka</option>
                </optgroup>
                <optgroup label ="Europe">
                    <option value="Ily">Italy</option>
                    <option value="Bel">Belgium</option>
                    <option value="Gem">Germany</option>
                    <option value="Swe">Sweden</option>
                    <option value="Fr">France</option>
                </optgroup>
             </select>
             <br>
             <br>


            <label for="skills">Skills: </label>
            HTML<input type="checkbox" name="skills" id="html">
            CSS<input type="checkbox" name="skills" id="css">
            JS<input type="checkbox" name="skills" id="js">
            UI<input type="checkbox" name="skills" id="UI">

            <br>
            <br>
            <input type="submit">
            <button type="submit">Submit</button>
        </fieldset>
    </form>

</body>
</html>
