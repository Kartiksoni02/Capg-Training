<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My page</title>
</head>
<body>
    <center>
        <strong>Name: </strong>Virat <!--This has meaning, important and has highest priority in browser-->
        <br> <!--for breaking the line-->
        <b>category: </b>Batsman<!--This is just to make it bold-->
        <br>
        <em>centuries: </em><!--Makes text italic and adds meaning(semantic), priority-->
        <i>85</i> <!--Just makes text italic-->
        <u>OrangeCap: </u>
        <ins>5</ins>
        <p>This is a paragraph. It is used to group sentences together.</p>
        <!--pre tag belongs to monospace font family and it prints exactly how we right-->
        <pre>This is preformatted text. It preserves whitespace and line breaks.</pre>

        <address>sdfd<code>6565</code></address>
        <h1>h<sub>2</sub>O</h1>
        <h1>e=mc<sup>2</sup></h1>

    </center>
    
</body>
</html>
