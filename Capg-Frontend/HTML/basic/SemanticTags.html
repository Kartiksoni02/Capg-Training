<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--
        H : header
        D : details
        A : aside
        M : main, mark
        N : nav
        S : summary, section
        T : time, table
        A : article
        F : footer
        F : figure, figcaption
         -->

    <nav style="height: 80px; width: 100%; background-color: lightpink; display: flex; justify-content: center; align-items: center;">This is the nav bar</nav>
<main>
    <aside style="height: 300px; width: 300px; background-color: lightblue;">This is the aside section</aside>
<details>
    <summary>Click to see the content</summary>
    <p>This is the main content of the page. It contains information about various topics and is displayed when the user clicks on the summary above.</p>
</details>

</main>
<footer style="height: 80px; width: 100%; background-color: lightgreen; display: flex; justify-content: center; align-items: center;">This is the footer</footer>


</body>
</html>
