<!DOCTYPE html>
<html>
<head>
    <title>Profile Card</title>
    <style>
        body {
            background-color: #141414;
            font-family: Arial;
            text-align: center;
        }

        .card {
            background-color: #1f1f1f;
            width: 250px;
            margin: 100px auto;
            padding: 20px;
            border-radius: 10px;
            color: white;
        }

        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
        }

        h2 {
            margin: 10px 0;
        }

        .location {
            color: #c5f82a;
            font-size: 14px;
        }

        .bio {
            font-size: 13px;
            margin: 15px 0;
        }

        button {
            width: 100%;
            margin: 5px 0;
            padding: 8px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="card">

    <img src="https://w0.peakpx.com/wallpaper/670/326/HD-wallpaper-doraemon-cartoon-cat.jpg" class="avatar">

    <h2>Kumar Dora</h2>

    <p class="location">Tokyo, Japan</p>

    <p class="bio">"Pocket-gadget engineer, problem solver, and avid eater."</p>

    <button>GitHub</button>
    <button>Frontend Mentor</button>
    <button>LinkedIn</button>
    <button>Twitter</button>
    <button>Instagram</button>

</div>

</body>
</html>
