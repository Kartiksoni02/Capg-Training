<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Order Summary</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #dfe6f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.card {
    width: 320px;
    background: white;
    border-radius: 15px;
    overflow: hidden;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* Top Image */
.card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
}

/* Content */
.content {
    padding: 20px;
}

h2 {
    margin: 10px 0;
}

p {
    color: gray;
    font-size: 14px;
}

/* Plan Box */
.plan {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #f2f4ff;
    padding: 12px;
    border-radius: 10px;
    margin: 20px 0;
}

.plan-left {
    display: flex;
    align-items: center;
}

.icon {
    background: #dcdcff;
    padding: 10px;
    border-radius: 50%;
    margin-right: 10px;
}

.plan-text {
    text-align: left;
}

.plan-text span {
    display: block;
    font-size: 12px;
    color: gray;
}

.change {
    color: #4a3aff;
    font-size: 13px;
    text-decoration: none;
}

/* Button */
.btn {
    display: block;
    background: #4a3aff;
    color: white;
    padding: 12px;
    border-radius: 10px;
    text-decoration: none;
    margin: 15px 0;
    font-weight: bold;
}

/* Cancel */
.cancel {
    color: gray;
    font-size: 13px;
    text-decoration: none;
}
</style>

</head>
<body>

<div class="card">

    <!-- 🔥 Your Image Here -->
    <img src="../assests/top-banner.png" alt="Music Illustration">

    <div class="content">

        <h2>Order Summary</h2>

        <p>
            You can now listen to millions of songs, audiobooks,
            and podcasts on any device anywhere you like!
        </p>

        <div class="plan">
            <div class="plan-left">
                <div class="icon">🎵</div>
                <div class="plan-text">
                    <strong>Annual Plan</strong>
                    <span>$59.99/year</span>
                </div>
            </div>

            <a href="#" class="change">Change</a>
        </div>

        <a href="#" class="btn">Proceed to Payment</a>

        <a href="#" class="cancel">Cancel Order</a>

    </div>

</div>

</body>
</html>
