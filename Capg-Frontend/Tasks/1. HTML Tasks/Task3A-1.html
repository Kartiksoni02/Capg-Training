<!DOCTYPE html>
<html>
<head>
    <title>Reservation</title>
</head>
<body>
<fieldset>
<h2>Reservation Information</h2>

<form>
    Name:* <br>
    <input type="text" placeholder="First Name" required>
    <input type="text" placeholder="Last Name" required><br><br>

    Phone:* <br>
    <input type="tel" placeholder="Ex-123456789" required><br><br>

    Email:* <br>
    <input type="email" placeholder="Enter mail Id" required><br><br>

    <table>
        <tr>
            <td>Check In Date:*</td>
            <td style="padding-left: 40px;">Check Out Date:*</td>
        </tr>
        <tr>
            <td><input type="date" required></td>
            <td style="padding-left: 40px;"><input type="date" required></td>
        </tr>
    </table>
    <br>

    Special Requirements:<br>
    <textarea></textarea><br><br>

    <input type="submit">
</form>
</fieldset>

</body>
</html>
